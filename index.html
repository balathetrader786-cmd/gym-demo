<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Receptionist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        .hero {
            display: flex; align-items: center; justify-content: space-between;
            height: 100vh; padding: 0 8%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        .content { flex: 1; max-width: 55%; }
        h1 { font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
        p { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; }

        /* NEON BUTTON - NO WAIT TIME */
        #sam-trigger {
            position: fixed; bottom: 30px; right: 30px;
            background: #000; border: 2px solid #00ffcc;
            border-radius: 8px; padding: 15px 25px;
            cursor: pointer; z-index: 9999;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .pulse-dot {
            width: 12px; height: 12px; background: #00ffcc;
            border-radius: 50%; position: relative;
        }

        .pulse-dot::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: #00ffcc; border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        #sam-trigger span { color: #00ffcc; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }
        .vapi-btn { display: none !important; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <h1>Iron Haven AI <br>Receptionist</h1>
            <p>Sam is active and ready to handle your bookings via voice. Click to start.</p>
        </div>
        <div style="background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
            <h2 style="margin-bottom:20px;">Ready to Start?</h2>
            <button style="width:100%; padding:15px; background:#00ffcc; color:#000; font-weight:900; border:none; border-radius:6px; cursor:pointer;">REQUEST INFO</button>
        </div>
    </div>

    <div id="sam-trigger" onclick="instantCall()">
        <div class="pulse-dot"></div>
        <span id="btn-text">Talk with Sam</span>
    </div>

    <script>
      let vapi = null;
      const assistant = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const apiKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      // Load SDK faster
      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.onload = function () {
          vapi = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: { showConversation: true, brandColor: "#00ffcc" }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");

      async function instantCall() {
          const text = document.getElementById('btn-text');
          
          if (!vapi) {
              text.innerText = "Connecting...";
              // Small delay to let the script finish its initial tick
              setTimeout(instantCall, 500);
              return;
          }

          try {
              text.innerText = "Sam is Active";
              await vapi.start();
              vapi.openConversation();
          } catch (e) {
              console.log("Waiting for connection...");
              text.innerText = "Talk with Sam";
          }
      }
    </script>
</body>
</html>
