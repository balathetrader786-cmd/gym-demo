<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven AI | Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: #000; color: #fff; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; height: 100vh; 
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; z-index: -1;
        }

        /* NEON BUTTON - NO MORE INITIALIZING SCREEN */
        #sam-btn {
            background: #000; border: 2px solid #00ffcc;
            border-radius: 8px; padding: 18px 35px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
            z-index: 9999;
        }
        .dot { width: 12px; height: 12px; background: #00ffcc; border-radius: 50%; position: relative; }
        .dot::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: #00ffcc; border-radius: 50%; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        span { color: #00ffcc; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; }
        
        /* HIDE THE BROKEN OVERLAY */
        .vapi-btn { display: none !important; }
    </style>
</head>
<body>
    <div class="hero-bg"></div>

    <div id="sam-btn" onclick="startSamNow()">
        <div class="dot"></div>
        <span id="btn-text">Talk with Sam</span>
    </div>

    <script>
        const ASSISTANT_ID = "61d207ff-2f1c-4026-8177-009d48fed794";
        const API_KEY = "6312920d-cbf7-4135-84b4-a860a296692b";
        let vapi = null;

        // Load the library instantly without running it yet
        (function() {
            const s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            document.head.appendChild(s);
        })();

        async function startSamNow() {
            const label = document.getElementById("btn-text");

            // 1. If script isn't loaded yet, wait a tiny bit
            if (!window.vapiSDK) {
                label.innerText = "Loading AI...";
                setTimeout(startSamNow, 500);
                return;
            }

            // 2. Only run the AI engine when they actually click
            if (!vapi) {
                vapi = window.vapiSDK.run({
                    apiKey: API_KEY,
                    assistant: ASSISTANT_ID,
                    config: { showConversation: true }
                });
            }

            try {
                label.innerText = "Connecting...";
                // 3. Force start and open UI
                await vapi.start();
                vapi.openConversation();
                label.innerText = "Sam Active";
            } catch (err) {
                label.innerText = "Talk with Sam";
                // If it asks for mic permission again
                console.error("Mic error:", err);
            }
        }
    </script>
</body>
</html>
