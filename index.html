<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven AI | Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; z-index: -1;
        }
        .content { text-align: center; }
        h1 { font-size: 4rem; text-transform: uppercase; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; font-size: 1.1rem; }
        
        /* UPDATED BUTTON STYLE */
        #sam-btn {
            background: #00ffcc; color: #000; border: none;
            padding: 20px 45px; border-radius: 12px; font-size: 1.3rem;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); transition: transform 0.1s;
        }
        #sam-btn:active { transform: scale(0.95); }
        .vapi-btn { display: none !important; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="content">
        <h1>IRON HAVEN</h1>
        <p>Talk to Sam to book your tour instantly.</p>
        <button id="sam-btn" onclick="startCall()">Talk with Sam</button>
    </div>

    <script>
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        document.head.appendChild(s);

        let vapiInstance = null;

        async function startCall() {
            const btn = document.getElementById("sam-btn");
            
            if (!window.vapiSDK) {
                btn.innerText = "LOADING...";
                return;
            }

            // Always re-initialize to ensure a fresh connection state
            vapiInstance = window.vapiSDK.run({
                apiKey: "6312920d-cbf7-4135-84b4-a860a296692b",
                assistant: "61d207ff-2f1c-4026-8177-009d48fed794",
                config: { showConversation: true }
            });

            try {
                btn.innerText = "CONNECTING...";
                // Explicitly request microphone via start
                await vapiInstance.start(); 
                btn.innerText = "SAM IS LIVE";
            } catch (e) {
                console.error(e);
                btn.innerText = "CHECK MIC & TRY AGAIN";
                // Trigger a native alert to force the browser to show the mic prompt
                alert("Please click 'Allow' on the microphone prompt at the top of your browser!");
            }
        }
    </script>
</body>
</html>
