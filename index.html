<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Receptionist</title>
    <link rel="icon" href="https://www.tmplclubs.com/favicon.ico">
    <style>
        /* RESET & BASE THEME */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        .hero {
            display: flex; align-items: center; justify-content: space-between;
            height: 100vh; padding: 0 8%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        .content { flex: 1; max-width: 55%; }
        h1 { font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; color: #fff; }
        p { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        
        .form-box {
            flex: 0 0 380px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); border-radius: 15px;
            padding: 35px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* THE TRIGGER BUTTON (REPLACING THE BLANK SPACE) */
        #ai-call-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #000; border: 2px solid #00ffcc;
            border-radius: 8px; padding: 15px 25px;
            cursor: pointer; z-index: 1000;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
        }

        #ai-call-btn:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(0, 255, 204, 0.5); }

        .pulse {
            width: 10px; height: 10px; background: #00ffcc;
            border-radius: 50%; position: relative;
        }
        .pulse::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: #00ffcc; border-radius: 50%;
            animation: ripple 1.5s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        #ai-call-btn span { color: #00ffcc; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }

        /* HIDE DEFAULT VAPI UI UNTIL CLICKED */
        .vapi-btn { display: none !important; }

        @media (max-width: 1000px) {
            .hero { flex-direction: column; padding: 80px 5%; text-align: center; height: auto; }
            .content { max-width: 100%; margin-bottom: 40px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <h1>Iron Haven AI <br>Receptionist</h1>
            <p>Sam is here to handle your gym bookings, membership questions, and tour schedules instantly via voice. No typing needed.</p>
        </div>

        <div class="form-box">
            <h2 style="margin-bottom:20px;">Get Started</h2>
            <input type="text" placeholder="Name" style="width:100%; padding:14px; margin-bottom:12px; background:rgba(255,255,255,0.08); border:none; border-radius:6px; color:#fff;">
            <button style="width:100%; padding:15px; background:#00ffcc; color:#000; font-weight:900; border:none; border-radius:6px; cursor:pointer; text-transform: uppercase;">Request Info</button>
        </div>
    </div>

    <div id="ai-call-btn" onclick="startSam()">
        <div class="pulse"></div>
        <span>Talk with Sam</span>
    </div>

    <script>
      let vapiInstance = null;
      const assistant = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const apiKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      // Load Vapi
      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.defer = true;
        js.onload = function () {
          vapiInstance = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: { 
                showConversation: true,
                brandColor: "#00ffcc"
            }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");

      // THE CLICK HANDLER
      function startSam() {
          if (vapiInstance) {
              vapiInstance.openConversation(); // This forces the "Call Scenario" window to open
          } else {
              console.log("Vapi not ready yet...");
          }
      }
    </script>
</body>
</html>
