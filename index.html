<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Receptionist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }

        .hero {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
        }

        /* NEON BUTTON */
        #sam-trigger {
            position: fixed; bottom: 30px; right: 30px;
            background: #000; border: 2px solid #00ffcc;
            border-radius: 8px; padding: 16px 28px;
            cursor: pointer; z-index: 9999;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            transition: opacity 0.5s;
            opacity: 0.5; /* Dim until Sam is ready */
            pointer-events: none; /* Block clicks until ready */
        }

        .pulse-dot { width: 12px; height: 12px; background: #555; border-radius: 50%; }
        
        /* When ready, turn dot green and enable button */
        #sam-trigger.ready { opacity: 1; pointer-events: auto; }
        #sam-trigger.ready .pulse-dot { background: #00ffcc; position: relative; }
        #sam-trigger.ready .pulse-dot::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: #00ffcc; border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        #sam-trigger span { color: #00ffcc; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }
        .vapi-btn { display: none !important; }
    </style>
</head>
<body>

    <div class="hero">
        <div>
            <h1 style="font-size: 4rem; margin-bottom: 10px;">Iron Haven AI</h1>
            <p style="color: #aaa;">Wait for the button to light up, then click to talk.</p>
        </div>
    </div>

    <div id="sam-trigger">
        <div class="pulse-dot"></div>
        <span id="btn-text">Initializing Sam...</span>
    </div>

    <script>
      let vapi = null;
      let callInstance = null;
      const assistant = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const apiKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.onload = function () {
          vapi = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: { showConversation: true, brandColor: "#00ffcc" }
          });

          // THE FIX: Wait for the SDK to confirm it is actually connected
          vapi.on('ready', () => {
              const btn = document.getElementById('sam-trigger');
              btn.classList.add('ready');
              document.getElementById('btn-text').innerText = "Talk with Sam";
          });

          vapi.on('call-start', () => { 
              document.getElementById('btn-text').innerText = "Sam is Active";
          });

          vapi.on('call-end', () => { 
              callInstance = null;
              document.getElementById('btn-text').innerText = "Talk with Sam";
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");

      async function handleSamClick() {
          if (!vapi) return;

          if (callInstance) {
              vapi.openConversation();
          } else {
              try {
                  // Only start if not already in a call
                  callInstance = await vapi.start();
                  vapi.openConversation();
              } catch (e) {
                  console.error("Mic Error:", e);
              }
          }
      }

      // Re-attaching click after the SDK loads
      document.getElementById('sam-trigger').onclick = handleSamClick;
    </script>
</body>
</html>
