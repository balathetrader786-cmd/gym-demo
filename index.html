<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven | AI Receptionist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        .overlay-card { 
            max-width: 550px; 
            padding: 50px; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; 
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-text {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #00ffcc;
            margin-bottom: 20px;
            display: block;
        }

        h1 { 
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px; 
        }

        p { 
            color: #d1d1d1; 
            font-size: 1.1rem;
            line-height: 1.6; 
            margin-bottom: 30px;
        }

        .cta-text { 
            background: #00ffcc;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>

    <script>
      var vapiInstance = null;
      const assistant = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const apiKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.defer = true;
        js.onload = function () {
          vapiInstance = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: { mode: "voice" }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");
    </script>
</head>
<body>
    <div class="overlay-card">
        <span class="logo-text">Iron Haven Fitness</span>
        <h1>Meet Sam</h1>
        <p>Our 24/7 AI Receptionist. While our trainers are on the floor, Sam is here to book your tours and answer your membership questions instantly.</p>
        <div class="cta-text">Click the icon to start call</div>
    </div>
</body>
</html>
