<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Concierge</title>
    
    <link rel="icon" href="https://www.tmplclubs.com/favicon.ico">

    <style>
        /* BASE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 0 8%;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* LEFT SIDE: TEXT CONTENT */
        .content { flex: 1; max-width: 50%; }
        .brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 40px; display: block; letter-spacing: 2px; text-transform: uppercase; }
        h1 { font-size: 3.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 25px; }
        p { font-size: 1.1rem; color: #d1d1d1; line-height: 1.6; margin-bottom: 40px; max-width: 90%; }
        .btn-outline {
            border: 2px solid #fff;
            color: #fff;
            padding: 14px 28px;
            text-transform: uppercase;
            font-weight: 700;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-outline:hover { background: #fff; color: #000; }

        /* RIGHT SIDE: LEAD FORM (Mimics the Duda screenshot) */
        .form-container {
            flex: 0 0 400px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
        }
        .form-container h2 { font-size: 1.8rem; margin-bottom: 20px; }
        .input-field {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #00e6b8; transform: translateY(-2px); }

        /* "ASK AI" BUTTON IN CORNER */
        #vapi-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            background: #000;
            border: 1px solid #00ffcc;
            border-radius: 50px;
            padding: 10px 22px;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            transition: 0.3s;
        }
        #vapi-btn:hover { transform: scale(1.05); }
        #vapi-btn span { color: #00ffcc; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* PULSE EFFECT */
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 255, 204, 0.5); }
            100% { box-shadow: 0 0 0 15px rgba(0, 255, 204, 0); }
        }

        /* MOBILE FIX */
        @media (max-width: 1000px) {
            .hero { flex-direction: column; height: auto; padding: 100px 5%; text-align: center; }
            .content { max-width: 100%; margin-bottom: 50px; }
            .form-container { width: 100%; }
        }
    </style>

    <script>
      var vapiInstance = null;
      const assistantID = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const publicAPIKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.defer = true;
        js.onload = function () {
          vapiInstance = window.vapiSDK.run({
            apiKey: publicAPIKey,
            assistant: assistantID,
            config: { 
                mode: "voice",
                showConversation: true, // This forces the conversation window to be available
                title: "Talk with Sam",
                subtitle: "Your 24/7 AI Receptionist"
            }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");

      // Custom function to open the call box
      function openAiCall() {
        if(vapiInstance) {
            vapiInstance.openConversation();
        }
      }
    </script>
</head>
<body>

    <div class="hero">
        <div class="content">
            <span class="brand-name">Iron Haven Fitness</span>
            <h1>24/7 AI <br>Receptionist</h1>
            <p>Don't let your leads go cold while you're training clients. Sam handles your tour bookings, answers questions, and fills your calendar instantly.</p>
            <a href="#" class="btn-outline">Our Services</a>
        </div>

        <div class="form-container">
            <h2>Get Started</h2>
            <form onsubmit="event.preventDefault(); alert('Lead Submitted! (Demo Only)');">
                <input type="text" class="input-field" placeholder="Full Name" required>
                <input type="tel" class="input-field" placeholder="Phone Number" required>
                <input type="email" class="input-field" placeholder="Email Address" required>
                <button type="submit" class="submit-btn">Request Information</button>
            </form>
        </div>
    </div>

    <div id="vapi-btn" class="pulse" onclick="openAiCall()">
        <span id="vapi-btn-text">⚡ Ask AI</span>
    </div>

</body>
</html>
