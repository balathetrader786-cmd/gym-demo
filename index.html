<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Concierge</title>
    
    <link rel="icon" href="https://www.tmplclubs.com/favicon.ico">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 0 8%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .content { flex: 1; max-width: 50%; }
        .brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 40px; display: block; letter-spacing: 2px; text-transform: uppercase; }
        h1 { font-size: 3.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 25px; }
        p { font-size: 1.1rem; color: #d1d1d1; line-height: 1.6; margin-bottom: 40px; max-width: 90%; }
        
        .form-container {
            flex: 0 0 400px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
        }
        .form-container h2 { font-size: 1.8rem; margin-bottom: 20px; }
        .input-field {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* NEW CUSTOM AI BUTTON (NO CALL ICON) */
        #custom-ai-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #000;
            border: 2px solid #00ffcc;
            border-radius: 8px; /* Square edges like the Duda screenshot */
            padding: 12px 24px;
            z-index: 9999;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #custom-ai-btn span {
            color: #00ffcc;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hide the default Vapi circular button so only our custom one shows */
        .vapi-btn { display: none !important; }

        @media (max-width: 1000px) {
            .hero { flex-direction: column; height: auto; padding: 100px 5%; text-align: center; }
            .content { max-width: 100%; margin-bottom: 50px; }
            .form-container { width: 100%; }
        }
    </style>

    <script>
      var vapiInstance = null;
      const assistantID = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const publicAPIKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.defer = true;
        js.onload = function () {
          vapiInstance = window.vapiSDK.run({
            apiKey: publicAPIKey,
            assistant: assistantID,
            config: { 
                mode: "voice",
                showConversation: true
            }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");

      // This function manually opens the Vapi Window
      function startAiCall() {
        if (vapiInstance) {
          vapiInstance.openConversation();
        } else {
          console.log("Vapi not loaded yet");
        }
      }
    </script>
</head>
<body>

    <div class="hero">
        <div class="content">
            <span class="brand-name">Iron Haven Fitness</span>
            <h1>24/7 AI <br>Receptionist</h1>
            <p>Sam handles your tour bookings and membership questions instantly. Click the AI button to experience the future of gym management.</p>
        </div>

        <div class="form-container">
            <h2>Get Started</h2>
            <form onsubmit="event.preventDefault();">
                <input type="text" class="input-field" placeholder="Full Name">
                <input type="tel" class="input-field" placeholder="Phone Number">
                <input type="email" class="input-field" placeholder="Email Address">
                <button type="submit" class="submit-btn">Request Information</button>
            </form>
        </div>
    </div>

    <div id="custom-ai-btn" onclick="startAiCall()">
        <span>Talk with AI</span>
    </div>

</body>
</html>
