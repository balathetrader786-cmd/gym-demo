<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Concierge</title>
    
    <link rel="icon" href="https://www.tmplclubs.com/favicon.ico">

    <style>
        /* BASE DESIGN */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        .hero {
            display: flex; align-items: center; justify-content: space-between;
            height: 100vh; padding: 0 8%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        .content { flex: 1; max-width: 50%; }
        h1 { font-size: 3.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 25px; }
        p { font-size: 1.1rem; color: #d1d1d1; margin-bottom: 40px; }
        
        .form-container {
            flex: 0 0 400px; background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px); border-radius: 12px;
            padding: 40px; border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* STYLING THE NATIVE AI BUTTON 
           This forces the AI's own button to match your Duda screenshot.
        */
        .vapi-btn {
            border-radius: 6px !important; 
            background-color: #000 !important;
            border: 2px solid #00ffcc !important;
            bottom: 30px !important;
            right: 30px !important;
            width: auto !important;
            height: auto !important;
            padding: 12px 24px !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4) !important;
            cursor: pointer !important;
        }

        /* Removes the phone icon so it looks like a clean web button */
        .vapi-btn-icon, .vapi-btn svg { display: none !important; }

        /* Styles the "TALK WITH AI" text inside the button */
        .vapi-btn-text {
            color: #00ffcc !important;
            font-weight: 800 !important;
            font-size: 0.85rem !important;
            text-transform: uppercase !important;
            letter-spacing: 1.5px !important;
            margin: 0 !important;
        }

        @media (max-width: 1000px) {
            .hero { flex-direction: column; padding: 100px 5%; text-align: center; height: auto; }
            .content { max-width: 100%; margin-bottom: 50px; }
            h1 { font-size: 2.8rem; }
            .form-container { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <h1>24/7 AI <br>Receptionist</h1>
            <p>Our AI Concierge Sam is ready to help. Click the button in the corner to book your tour or ask about our membership plans via voice.</p>
        </div>

        <div class="form-container">
            <h2 style="margin-bottom:20px; font-size: 1.8rem;">Get Started</h2>
            <form onsubmit="event.preventDefault();">
                <input type="text" placeholder="Full Name" style="width:100%; padding:15px; margin-bottom:15px; border-radius:5px; border:1px solid #444; background:rgba(255,255,255,0.05); color:#fff;">
                <input type="tel" placeholder="Phone Number" style="width:100%; padding:15px; margin-bottom:15px; border-radius:5px; border:1px solid #444; background:rgba(255,255,255,0.05); color:#fff;">
                <button type="submit" style="width:100%; padding:16px; background:#00ffcc; color:#000; font-weight:800; border:none; border-radius:5px; cursor:pointer; text-transform: uppercase;">Request Information</button>
            </form>
        </div>
    </div>

    <script>
      const assistantID = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const publicAPIKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.defer = true;
        js.onload = function () {
          window.vapiSDK.run({
            apiKey: publicAPIKey,
            assistant: assistantID,
            config: { 
                mode: "voice",
                showConversation: true, // This enables the Duda-style pop-out window
                buttonText: "TALK WITH AI" // The text that will appear in your custom button
            }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");
    </script>

</body>
</html>
