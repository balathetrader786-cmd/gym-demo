<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven Fitness | AI Concierge</title>
    <link rel="icon" href="https://www.tmplclubs.com/favicon.ico">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 0 8%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .content { flex: 1; max-width: 50%; }
        h1 { font-size: 3.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 25px; }
        p { font-size: 1.1rem; color: #d1d1d1; margin-bottom: 40px; }
        
        .form-container {
            flex: 0 0 400px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* FIXED AI BUTTON - NO LONGER BLANK */
        #ai-voice-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #000;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            padding: 15px 25px;
            z-index: 10000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
        }

        /* GLOWING ANIMATION */
        .pulse-dot {
            height: 10px;
            width: 10px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        #ai-voice-trigger span {
            color: #00ffcc;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* HIDE DEFAULT VAPI ICON */
        .vapi-btn { display: none !important; }

        @media (max-width: 1000px) {
            .hero { flex-direction: column; padding: 100px 5%; text-align: center; }
            .content { max-width: 100%; margin-bottom: 50px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <h1>24/7 AI <br>Receptionist</h1>
            <p>Our AI Concierge is ready to help. Click the button in the corner to book your tour or ask about our membership plans.</p>
        </div>

        <div class="form-container">
            <h2>Get Started</h2>
            <form onsubmit="event.preventDefault();">
                <input type="text" style="width:100%; padding:15px; margin:10px 0; border-radius:5px; border:none;" placeholder="Full Name">
                <button type="submit" style="width:100%; padding:15px; background:#00ffcc; font-weight:bold; border:none; border-radius:5px; cursor:pointer;">REQUEST INFO</button>
            </form>
        </div>
    </div>

    <div id="ai-voice-trigger" onclick="vapiInstance.openConversation()">
        <span class="pulse-dot"></span>
        <span>Talk to Sam (AI)</span>
    </div>

    <script>
      var vapiInstance = null;
      const assistant = "61d207ff-2f1c-4026-8177-009d48fed794"; 
      const apiKey = "6312920d-cbf7-4135-84b4-a860a296692b"; 

      (function (d, s, id) {
        var js, vjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        js.defer = true;
        js.onload = function () {
          vapiInstance = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: { mode: "voice", showConversation: true }
          });
        };
        vjs.parentNode.insertBefore(js, vjs);
      })(document, "script", "vapi-script");
    </script>
</body>
</html>
