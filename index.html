<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven AI | Final Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; z-index: -1;
        }

        /* NEON CALL BUTTON */
        #sam-launcher {
            background: #000; border: 2px solid #00ffcc;
            border-radius: 8px; padding: 18px 32px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
            opacity: 0.4; pointer-events: none; /* Locked until ready */
        }

        #sam-launcher.active { opacity: 1; pointer-events: auto; }
        #sam-launcher:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 204, 0.5); }

        .dot { width: 12px; height: 12px; background: #00ffcc; border-radius: 50%; position: relative; }
        .active .dot::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: #00ffcc; border-radius: 50%; animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        
        span { color: #00ffcc; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; }
        .vapi-btn { display: none !important; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div id="sam-launcher">
        <div class="dot"></div>
        <span id="txt">Initializing Sam...</span>
    </div>

    <script>
        const ASSISTANT_ID = "61d207ff-2f1c-4026-8177-009d48fed794";
        const API_KEY = "6312920d-cbf7-4135-84b4-a860a296692b";
        let vapi = null;

        // 1. Safe Script Loading
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        script.defer = true;
        document.head.appendChild(script);

        script.onload = () => {
            vapi = window.vapiSDK.run({
                apiKey: API_KEY,
                assistant: ASSISTANT_ID,
                config: { showConversation: true, brandColor: "#00ffcc" }
            });

            // 2. The Key: Wait for 'ready' before allowing the click
            vapi.on('ready', () => {
                const btn = document.getElementById("sam-launcher");
                btn.classList.add("active");
                document.getElementById("txt").innerText = "Talk with Sam";
            });

            // 3. Handle Call Events to prevent loops
            vapi.on('call-start', () => {
                document.getElementById("txt").innerText = "Sam is Active";
            });

            vapi.on('call-end', () => {
                document.getElementById("txt").innerText = "Talk with Sam";
            });
        };

        // 4. Single-Action Trigger
        document.getElementById("sam-launcher").onclick = () => {
            if (vapi) {
                vapi.start(); // Initiates audio properly
                vapi.openConversation(); // Shows the UI
            }
        };
    </script>
</body>
</html>
