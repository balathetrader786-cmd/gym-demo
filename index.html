
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Haven AI | Instant-On</title>
    <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; z-index: -1;
        }
        .content { text-align: center; }
        #sam-btn {
            background: #00ffcc; color: #000; border: none; padding: 22px 45px;
            border-radius: 12px; font-size: 1.4rem; font-weight: 900;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        }
        .vapi-btn { display: none !important; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="content">
        <h1 style="font-size: 4rem; margin-bottom: 20px;">IRON HAVEN</h1>
        <button id="sam-btn" onclick="startSamNow()">Talk with Sam</button>
    </div>

    <script>
        let vapi = null;

        async function startSamNow() {
            const btn = document.getElementById("sam-btn");
            
            // Check if SDK is present
            if (!window.vapiSDK) {
                btn.innerText = "Connecting...";
                setTimeout(startSamNow, 300);
                return;
            }

            // Start only when clicked to avoid browser blocks
            if (!vapi) {
                vapi = window.vapiSDK.run({
                    apiKey: "6312920d-cbf7-4135-84b4-a860a296692b",
                    assistant: "61d207ff-2f1c-4026-8177-009d48fed794",
                    config: { showConversation: true }
                });
            }

            try {
                btn.innerText = "WAKING UP...";
                await vapi.start(); // Direct user-triggered mic request
                vapi.openConversation();
                btn.innerText = "SAM IS LIVE";
            } catch (e) {
                btn.innerText = "ERROR - TRY AGAIN";
                console.error(e);
            }
        }
    </script>
</body>
</html>
